services:
  resource-update-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resource-update-server
    environment:
      CI_PUBLISH_TOKEN: ${CI_PUBLISH_TOKEN:?CI_PUBLISH_TOKEN is required}
      SIGNING_ACTIVE_KEY_ID: ${SIGNING_ACTIVE_KEY_ID:?SIGNING_ACTIVE_KEY_ID is required}
      SIGNING_KEYS_JSON: ${SIGNING_KEYS_JSON:?SIGNING_KEYS_JSON is required}
      HOST: 0.0.0.0
      PORT: 8080
      ARTIFACT_BACKEND: ${ARTIFACT_BACKEND:-local}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-0}
      CLEANUP_KEEP_LAST: ${CLEANUP_KEEP_LAST:-3}
    volumes:
      - ./Public:/app/Public
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: resource-update-server-caddy
    depends_on:
      - resource-update-server
    ports:
      - "${HTTPS_HOST_PORT:-8443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
