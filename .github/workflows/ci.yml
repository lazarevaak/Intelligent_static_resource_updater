name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      publish_resources:
        description: "Publish resources and manifest"
        required: false
        default: false
        type: boolean
      resource_version:
        description: "Override resource version"
        required: false
        type: string

env:
  SERVER_DIR: server/ResourceUpdateServer
  SDK_DIR: sdk/ResourceUpdater
  MIN_SDK_VERSION: 1.0

jobs:
  server_tests:
    name: Server Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show Swift version
        run: swift --version

      - name: Patch swift-configuration for CI
        working-directory: ${{ env.SERVER_DIR }}
        run: |
          set -eu
          swift package resolve
          CONFIG_FILE="$(find .build/checkouts/swift-configuration -path '*/Sources/Configuration/Providers/Files/FileProvider.swift' | head -n 1)"
          if [ -n "${CONFIG_FILE:-}" ] && [ -f "$CONFIG_FILE" ]; then
            perl -0pi -e 's/data: fileContents!\.bytes,/data: Array(fileContents!),/g' "$CONFIG_FILE"
          fi

      - name: Run server tests
        working-directory: ${{ env.SERVER_DIR }}
        run: swift test

  sdk_tests:
    name: SDK Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Run SDK tests
        working-directory: ${{ env.SDK_DIR }}
        run: swift test

  resource_validate:
    name: Validate Resources
    runs-on: macos-15
    needs:
      - server_tests
      - sdk_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show Swift version
        run: swift --version

      - name: Patch swift-configuration for CI
        working-directory: ${{ env.SERVER_DIR }}
        run: |
          set -eu
          swift package resolve
          CONFIG_FILE="$(find .build/checkouts/swift-configuration -path '*/Sources/Configuration/Providers/Files/FileProvider.swift' | head -n 1)"
          if [ -n "${CONFIG_FILE:-}" ] && [ -f "$CONFIG_FILE" ]; then
            perl -0pi -e 's/data: fileContents!\.bytes,/data: Array(fileContents!),/g' "$CONFIG_FILE"
          fi

      - name: Validate resources
        env:
          STATIC_RESOURCES_DIR: ${{ vars.STATIC_RESOURCES_DIR }}
          RESOURCE_APP_ID: ${{ vars.RESOURCE_APP_ID }}
          RESOURCE_VERSION_INPUT: ${{ github.event.inputs.resource_version }}
        run: |
          set -eu

          if [ -z "${STATIC_RESOURCES_DIR:-}" ]; then
            echo "STATIC_RESOURCES_DIR is not set. Resource validation is skipped."
            exit 0
          fi

          if [ -z "${RESOURCE_APP_ID:-}" ]; then
            echo "RESOURCE_APP_ID is required when STATIC_RESOURCES_DIR is set."
            exit 1
          fi

          RESOURCES_PATH="$GITHUB_WORKSPACE/$STATIC_RESOURCES_DIR"
          if [ ! -d "$RESOURCES_PATH" ]; then
            echo "Resources directory does not exist: $RESOURCES_PATH"
            exit 1
          fi

          RESOURCE_VERSION="${RESOURCE_VERSION_INPUT:-}"
          if [ -z "$RESOURCE_VERSION" ]; then
            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              RESOURCE_VERSION="${GITHUB_REF_NAME}"
            else
              RESOURCE_VERSION="1.0.${GITHUB_RUN_NUMBER}"
            fi
          fi

          echo "Validating resources from $RESOURCES_PATH"
          echo "Resolved resource version: $RESOURCE_VERSION"

          cd "$SERVER_DIR"
          swift run ResourceUpdateServer validate \
            --app-id "$RESOURCE_APP_ID" \
            --version "$RESOURCE_VERSION" \
            --resources-dir "$RESOURCES_PATH" \
            --min-sdk-version "$MIN_SDK_VERSION"

  publish_resources:
    name: Publish Resources
    runs-on: macos-15
    needs:
      - resource_validate
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' && github.event.inputs.publish_resources == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show Swift version
        run: swift --version

      - name: Patch swift-configuration for CI
        working-directory: ${{ env.SERVER_DIR }}
        run: |
          set -eu
          swift package resolve
          CONFIG_FILE="$(find .build/checkouts/swift-configuration -path '*/Sources/Configuration/Providers/Files/FileProvider.swift' | head -n 1)"
          if [ -n "${CONFIG_FILE:-}" ] && [ -f "$CONFIG_FILE" ]; then
            perl -0pi -e 's/data: fileContents!\.bytes,/data: Array(fileContents!),/g' "$CONFIG_FILE"
          fi

      - name: Publish resources and manifest
        env:
          STATIC_RESOURCES_DIR: ${{ vars.STATIC_RESOURCES_DIR }}
          RESOURCE_APP_ID: ${{ vars.RESOURCE_APP_ID }}
          RESOURCE_UPDATE_BASE_URL: ${{ vars.RESOURCE_UPDATE_BASE_URL }}
          CI_PUBLISH_TOKEN: ${{ secrets.CI_PUBLISH_TOKEN }}
          RESOURCE_VERSION_INPUT: ${{ github.event.inputs.resource_version }}
        run: |
          set -eu

          : "${STATIC_RESOURCES_DIR:?STATIC_RESOURCES_DIR is required}"
          : "${RESOURCE_APP_ID:?RESOURCE_APP_ID is required}"
          : "${RESOURCE_UPDATE_BASE_URL:?RESOURCE_UPDATE_BASE_URL is required}"
          : "${CI_PUBLISH_TOKEN:?CI_PUBLISH_TOKEN is required}"

          RESOURCES_PATH="$GITHUB_WORKSPACE/$STATIC_RESOURCES_DIR"
          if [ ! -d "$RESOURCES_PATH" ]; then
            echo "Resources directory does not exist: $RESOURCES_PATH"
            exit 1
          fi

          RESOURCE_VERSION="${RESOURCE_VERSION_INPUT:-}"
          if [ -z "$RESOURCE_VERSION" ]; then
            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              RESOURCE_VERSION="${GITHUB_REF_NAME}"
            else
              RESOURCE_VERSION="1.0.${GITHUB_RUN_NUMBER}"
            fi
          fi

          REQUEST_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"

          echo "Publishing resources from $RESOURCES_PATH"
          echo "Resolved resource version: $RESOURCE_VERSION"
          echo "Target app id: $RESOURCE_APP_ID"
          echo "Base URL: $RESOURCE_UPDATE_BASE_URL"

          cd "$SERVER_DIR"
          swift run ResourceUpdateServer publish-local \
            --base-url "$RESOURCE_UPDATE_BASE_URL" \
            --app-id "$RESOURCE_APP_ID" \
            --version "$RESOURCE_VERSION" \
            --resources-dir "$RESOURCES_PATH" \
            --min-sdk-version "$MIN_SDK_VERSION" \
            --request-id "$REQUEST_ID" \
            --token "$CI_PUBLISH_TOKEN"
